<!DOCTYPE html>
<html>
<head>
<title>Submit Feedback</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<header>
<h1>Event Feedback</h1>
</header>

<nav>
<ul>
<li><a href="{{ url_for('home') }}">Home</a></li>
<li><a href="{{ url_for('events') }}">Events</a></li>
<li><a href="{{ url_for('feedback') }}">Feedback</a></li>

{% if session.get("admin_logged_in") %}
<li><a href="{{ url_for('logout') }}">Logout</a></li>
{% else %}
<li><a href="{{ url_for('admin_login') }}">Admin</a></li>
{% endif %}

</ul>
</nav>

<main>

<form class="feedback-form" method="POST" action="{{ url_for('submit_feedback') }}">

<h2>Submit Your Feedback</h2>

<input type="text" name="name" placeholder="Your Name" required>

<input type="email" name="email" placeholder="Your Email" required>

<select name="event" required>
<option value="">Select Event</option>
<option>Tech Seminar 2026</option>
<option>Web Development Workshop</option>
</select>

<label>Overall Rating</label>

<select name="q8" required>
<option value="">Select Rating</option>
<option value="1">1 - Poor</option>
<option value="2">2 - Fair</option>
<option value="3">3 - Good</option>
<option value="4">4 - Very Good</option>
<option value="5">5 - Excellent</option>
</select>

<textarea name="liked" placeholder="What did you like most?" required></textarea>

<textarea name="improvement" placeholder="Areas for improvement" required></textarea>

<textarea name="suggestion" placeholder="Suggestions for future events" required></textarea>

<button type="submit">Submit Feedback</button>

</form>

</main>

<footer>
© 2026 Event Feedback System
</footer>

</body>
</html>
